name: Deploy Client to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NODE_VERSION: '20'

jobs:
  test:
    name: Test Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Lint & type-check
        working-directory: client
        run: pnpm exec tsc --noEmit

      - name: Run tests
        working-directory: client
        run: pnpm test

  deploy:
    name: Build & Deploy Client
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Terraform outputs (Cognito IDs)
        id: tf_outputs
        run: |
          USER_POOL_ID=$(aws ssm get-parameter \
            --name "/amazing-adventure-prod/cognito/user-pool-id" \
            --query "Parameter.Value" --output text)
          CLIENT_ID=$(aws ssm get-parameter \
            --name "/amazing-adventure-prod/cognito/client-id" \
            --query "Parameter.Value" --output text)
          echo "user_pool_id=$USER_POOL_ID" >> "$GITHUB_OUTPUT"
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"

      - name: Build Vite app
        working-directory: client
        env:
          # Empty = same-origin through CloudFront; call sites include "api/" in path
          VITE_APP_URI: ""
          # WebSocket connects directly to API Gateway — not through CloudFront.
          # CloudFront does not reliably proxy WebSocket upgrades.
          VITE_WS_ENDPOINT: ${{ secrets.VITE_WS_ENDPOINT }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.tf_outputs.outputs.user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.tf_outputs.outputs.client_id }}
        run: pnpm build

      - name: Sync to S3
        run: |
          aws s3 sync client/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html gets no-cache so deploys are instant
          aws s3 cp client/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-store,no-cache,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
